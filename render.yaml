services:
  - type: web
    name: bydash-localized-store
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATA_DIR
        value: /var/data
    disk:
      name: bydash-store-data
      mountPath: /var/data
      sizeGB: 1
